<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Arrowhead markers -->
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#A3B899" />
    </marker>
  </defs>

  <!-- Background Triangle with bi-directional arrows -->
  <line x1="184" y1="88" x2="95" y2="242" stroke="#A3B899" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)" />
  <line x1="111" y1="270" x2="289" y2="270" stroke="#A3B899" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)" />
  <line x1="305" y1="242" x2="216" y2="88" stroke="#A3B899" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)" />

  <!-- Connecting Lines to Center -->
  <line x1="200" y1="92" x2="200" y2="172" stroke="#A3B899" stroke-width="2" marker-start="url(#arrow)" marker-end="url(#arrow)" />
  <line x1="107" y1="254" x2="176" y2="214" stroke="#A3B899" stroke-width="2" marker-start="url(#arrow)" marker-end="url(#arrow)" />
  <line x1="293" y1="254" x2="224" y2="214" stroke="#A3B899" stroke-width="2" marker-start="url(#arrow)" marker-end="url(#arrow)" />

  <!-- Nodes -->
  <!-- Top: Statistics -->
  <circle cx="200" cy="60" r="32" fill="#EAE0D5" stroke="#A3B899" stroke-width="2" />
  <text x="200" y="56" font-family="sans-serif" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">Stats</text>
  <text x="200" y="70" font-family="sans-serif" font-size="9" fill="#1A1A1A" text-anchor="middle">Probability</text>

  <!-- Bottom Left: CS -->
  <circle cx="79" cy="270" r="32" fill="#EAE0D5" stroke="#A3B899" stroke-width="2" />
  <text x="79" y="266" font-family="sans-serif" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">CS</text>
  <text x="79" y="280" font-family="sans-serif" font-size="9" fill="#1A1A1A" text-anchor="middle">Systems</text>

  <!-- Bottom Right: RL -->
  <circle cx="321" cy="270" r="32" fill="#EAE0D5" stroke="#A3B899" stroke-width="2" />
  <text x="321" y="266" font-family="sans-serif" font-size="12" font-weight="600" fill="#1A1A1A" text-anchor="middle">RL</text>
  <text x="321" y="280" font-family="sans-serif" font-size="9" fill="#1A1A1A" text-anchor="middle">Decisions</text>

  <!-- Center Node: Daniel Kim -->
  <circle cx="200" cy="200" r="28" fill="#D6CBBF" />
  <text x="200" y="196" font-family="sans-serif" font-size="10" font-weight="600" fill="#1A1A1A" text-anchor="middle">Daniel</text>
  <text x="200" y="208" font-family="sans-serif" font-size="10" font-weight="600" fill="#1A1A1A" text-anchor="middle">Kim</text>
</svg>
